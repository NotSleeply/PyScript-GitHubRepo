github:
  username: "codewithsadee"
  # token: "ghp_xxxxxxxxxxxx"  # 可选，用于提升 API 限流额度并访问私有仓库

download:
  mode: "git" # "zip" 或 "git"
  save_path: "./repos" # 仓库存放的目录
  target_ref: "master" # 默认拉取的分支或 Tag
  keep_zip: false # ZIP 模式下解压后是否保留 ZIP 文件

filter:
  language: "" # 语言筛选，示例: "Python"
  min_stars: 0 # 最小星标数
  updated_after: "" # 更新时间筛选，示例: "2023-01-01"
  max_repos: 0 # 最大下载数量限制，0表示不限制

concurrency:
  max_workers: 5 # 多线程并发数

report:
  format: "markdown" # "markdown" 或 "csv"
  # output_dir: "./reports"      # 可选，报告输出目录
